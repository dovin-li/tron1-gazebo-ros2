slam_toolbox:
  ros__parameters:
    use_sim_time: true
    mode: mapping
    map_frame: map
    odom_frame: odom
    base_frame: base_footprint
    scan_topic: /scan
    transform_timeout: 1.0
    map_update_interval: 0.1
    resolution: 0.05
    max_laser_range: 20.0
    min_laser_range: 0.1
    minimum_time_interval: 0.05
    minimum_travel_distance: 0.1
    minimum_travel_heading: 0.1
    transform_publish_period: 0.05
    throttle_scans: 1
